
# ============================================================
# RAG System Configuration
# ============================================================

version: "1.0.0"

# ---------------------
# Embedding settings
# ---------------------
embeddings:
  model_name: "all-MiniLM-L6-v2"   # Sentence-Transformers model
  device: "cpu"                      # "cpu" or "cuda"
  batch_size: 32
  cache_dir: ".cache/embeddings"     # Local embedding cache

# ---------------------
# Chunking settings
# ---------------------
chunking:
  chunk_size: 600          # Target tokens per chunk
  chunk_overlap: 100       # Overlap tokens between chunks
  min_chunk_size: 100      # Discard chunks smaller than this

# ---------------------
# Vector store (ChromaDB)
# ---------------------
vector_store:
  provider: "chroma"
  persist_directory: "./chroma_db"
  collection_name: "rag_documents"

# ---------------------
# Retrieval settings
# ---------------------
retrieval:
  top_k: 10                # Chunks fetched from vector store
  top_n_rerank: 5          # Chunks kept after reranking
  use_bm25: true           # Enable BM25 hybrid retrieval
  bm25_weight: 0.3         # Weight for BM25 scores in fusion
  vector_weight: 0.7       # Weight for vector scores in fusion
  reranker_model: "cross-encoder/ms-marco-MiniLM-L-6-v2"
  use_reranker: false      # Set to true after first run (downloads ~85MB cross-encoder)

# ---------------------
# LLM (Generation)
# ---------------------
generation:
  provider: "deepseek"          # "anthropic" | "openai" | "deepseek"
  model: "deepseek-chat"        # Free tier model at platform.deepseek.com
  max_tokens: 2048
  temperature: 0.1         # Low temp for factual grounding
  timeout_seconds: 60

# ---------------------
# Logging
# ---------------------
logging:
  level: "INFO"            # DEBUG | INFO | WARNING | ERROR
  log_file: "logs/rag_system.log"
  max_file_size_mb: 50
  backup_count: 5

# ---------------------
# Evaluation
# ---------------------
evaluation:
  golden_dataset_path: "evaluation/golden_dataset.json"
  output_path: "evaluation/results"
  faithfulness_threshold: 0.7
  answer_correctness_threshold: 0.6
  context_relevance_threshold: 0.5
  fail_build_on_threshold: true

# ---------------------
# Supported file types
# ---------------------
ingestion:
  supported_extensions:
    - ".pdf"
    - ".txt"
    - ".md"
    - ".markdown"
  max_file_size_mb: 100
