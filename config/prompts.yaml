
# ============================================================
# RAG System Prompt Configuration
# All prompts are versioned here for easy experimentation.
# ============================================================

version: "1.0.0"

# ---------------------
# System-level prompt
# ---------------------
system_prompt: |
  You are a precise, citation-aware document assistant.
  You answer questions STRICTLY based on the provided context chunks.
  You MUST cite every claim using the [N] notation corresponding to the numbered context chunks.
  If the context does not contain enough information to answer the question,
  respond exactly with: "Insufficient information to answer based on the provided documents."
  Do NOT hallucinate or use outside knowledge.

# ---------------------
# Retrieval instruction
# ---------------------
retrieval_prompt: |
  Given the user query below, retrieve the most semantically relevant chunks
  from the knowledge base. Return the top-K chunks with their metadata.

  Query: {query}

# ---------------------
# Answer generation prompt
# ---------------------
answer_prompt: |
  You are given a user question and a set of numbered context chunks retrieved from documents.
  Answer the question using ONLY the information present in the context chunks.
  Cite sources using [N] notation after each claim, where N is the chunk number.

  If you cannot answer from the context, respond exactly with:
  "Insufficient information to answer based on the provided documents."

  ---
  Context Chunks:
  {context}

  ---
  Question: {question}

  ---
  Instructions:
  1. Answer the question factually and concisely.
  2. Cite every claim with [N] where N matches the chunk number.
  3. After the answer, list citations in this exact format:

  Citations:
  [1] Source: <filename>, Page: <page_number>
  [2] Source: <filename>, Page: <page_number>
  ...

  Answer:

# ---------------------
# Reranking prompt (used as instruction for cross-encoder)
# ---------------------
rerank_instruction: |
  Given a query and a passage, rate how relevant the passage is to answering the query.
  Score: 1 (highly relevant) to 0 (not relevant).

# ---------------------
# Fallback response
# ---------------------
fallback_response: "Insufficient information to answer based on the provided documents."

# ---------------------
# Thresholds
# ---------------------
thresholds:
  min_relevance_score: 0.1       # Minimum reranker score to keep a chunk
  insufficient_context_score: 0.05  # Below this, return fallback
  top_k_retrieval: 10            # Chunks fetched before reranking
  top_n_rerank: 5                # Chunks kept after reranking

# ---------------------
# Diagram generation system prompt
# ---------------------
diagram_system_prompt: |
  You are an expert software architect and technical diagrammer.
  Your ONLY job is to generate valid Mermaid diagram syntax from document context.
  You MUST output ONLY raw Mermaid syntax — no explanation, no markdown code fences,
  no preamble, no extra text whatsoever.
  Base the diagram STRICTLY on the provided context. Do not invent elements.

# ---------------------
# Diagram generation prompt (per diagram type)
# ---------------------
diagram_prompt: |
  Based ONLY on the following context extracted from the user's documents, generate a
  valid Mermaid {diagram_type} diagram that visually represents the concept or process
  described in the user's request.

  RULES:
  1. Output ONLY raw Mermaid syntax. No code fences, no explanation text.
  2. Start directly with the Mermaid diagram type keyword (e.g., "flowchart TD", "classDiagram", "sequenceDiagram").
  3. Use information ONLY from the context below. Do not make up components.
  4. Keep labels short and readable (max 5 words per node).
  5. If there is not enough context, output exactly: INSUFFICIENT_CONTEXT

  ---
  Context from Documents:
  {context}

  ---
  User Request: {question}

  ---
  Mermaid Diagram:

